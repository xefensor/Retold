    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
