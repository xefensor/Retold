name: Release

on:
  push:
    branches: [master]
    paths:
      - gradle.properties
      - CHANGELOG.md
      - README.md
      - .github/workflows/release.yml

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read release version
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          if [[ -z "$version" ]]; then
            echo "mod_version is missing from gradle.properties" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check whether release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify changelog entry
        if: steps.existing.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if ! grep -Fq "## $VERSION - " CHANGELOG.md; then
            echo "CHANGELOG.md has no release entry for $VERSION" >&2
            exit 1
          fi

      - name: Update existing release title
        if: steps.existing.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: gh release edit "$TAG" --title "Retold $VERSION"

      - name: Upload checksum for existing release
        if: steps.existing.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          artifact="retold-$VERSION.jar"
          mkdir -p existing-release
          gh release download "$TAG" --pattern "$artifact" --dir existing-release
          (
            cd existing-release
            sha256sum "$artifact" > "$artifact.sha256"
          )
          gh release upload "$TAG" "existing-release/$artifact.sha256" --clobber

      - name: Make Gradle wrapper executable
        if: steps.existing.outputs.exists == 'false'
        run: chmod +x ./gradlew

      - name: Build and run unit tests
        if: steps.existing.outputs.exists == 'false'
        run: ./gradlew clean build

      - name: Run GameTests
        if: steps.existing.outputs.exists == 'false'
        run: ./gradlew runGameTestServer
        timeout-minutes: 10

      - name: Extract release notes
        if: steps.existing.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          awk -v version="$VERSION" '
            index($0, "## " version " - ") == 1 { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "Release notes for $VERSION are empty" >&2
            exit 1
          fi

      - name: Publish GitHub release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          artifact="build/libs/retold-$VERSION.jar"
          if [[ ! -f "$artifact" ]]; then
            echo "Expected release artifact not found: $artifact" >&2
            exit 1
          fi

          (
            cd "$(dirname "$artifact")"
            sha256sum "$(basename "$artifact")" > "$(basename "$artifact").sha256"
          )

          gh release create "$TAG" "$artifact" "$artifact.sha256" \
            --target "$GITHUB_SHA" \
            --title "Retold $VERSION" \
            --notes-file release-notes.md
