name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, without the v prefix'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read and validate release version
        id: version
        env:
          MANUAL_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          if [[ -z "$version" ]]; then
            echo "mod_version is missing from gradle.properties" >&2
            exit 1
          fi

          tag="v$version"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "$tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match mod_version $version" >&2
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$MANUAL_VERSION" != "$version" ]]; then
            echo "Requested version $MANUAL_VERSION does not match mod_version $version" >&2
            exit 1
          fi

          case "$version" in
            *-alpha*|*-snapshot*)
              release_type="alpha"
              ;;
            *-beta*|*-rc*)
              release_type="beta"
              ;;
            *)
              release_type="release"
              ;;
          esac

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_type=$release_type" >> "$GITHUB_OUTPUT"

      - name: Verify publisher configuration
        env:
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        shell: bash
        run: |
          required_settings=(
            MODRINTH_PROJECT_ID
            CURSEFORGE_PROJECT_ID
            MODRINTH_TOKEN
            CURSEFORGE_TOKEN
          )

          for name in "${required_settings[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "Required GitHub Actions setting is missing: $name" >&2
              exit 1
            fi
          done

      - name: Ensure release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists" >&2
            exit 1
          fi

      - name: Verify changelog entry
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if ! grep -Fq "## $VERSION - " CHANGELOG.md; then
            echo "CHANGELOG.md has no release entry for $VERSION" >&2
            exit 1
          fi

      - name: Build and run unit tests
        run: ./gradlew clean build

      - name: Run GameTests
        run: ./gradlew runGameTestServer
        timeout-minutes: 10

      - name: Extract release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          awk -v version="$VERSION" '
            index($0, "## " version " - ") == 1 { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "Release notes for $VERSION are empty" >&2
            exit 1
          fi

      - name: Render CurseForge changelog
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          jq -Rs '{ text: ., mode: "gfm" }' release-notes.md \
            | gh api --method POST markdown --input - \
            > curseforge-release-notes.html

          if [[ ! -s curseforge-release-notes.html ]]; then
            echo "Rendered CurseForge changelog is empty" >&2
            exit 1
          fi

      - name: Prepare release artifact
        id: artifact
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          artifact="build/libs/retold-$VERSION.jar"
          if [[ ! -f "$artifact" ]]; then
            echo "Expected release artifact not found: $artifact" >&2
            exit 1
          fi

          sha256sum "$artifact" > "$artifact.sha256"
          echo "jar=$artifact" >> "$GITHUB_OUTPUT"
          echo "checksum=$artifact.sha256" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub, Modrinth, and CurseForge
        id: publish
        uses: Kira-NT/mc-publish@v3.3.1
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: ${{ steps.version.outputs.tag }}
          github-commitish: ${{ github.sha }}
          github-generate-changelog: false
          github-draft: false
          github-prerelease: ${{ steps.version.outputs.release_type != 'release' }}

          files: ${{ steps.artifact.outputs.jar }}
          github-files: |
            ${{ steps.artifact.outputs.jar }}
            ${{ steps.artifact.outputs.checksum }}

          name: Retold ${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          version-type: ${{ steps.version.outputs.release_type }}
          changelog-file: release-notes.md

          loaders: neoforge
          environment: client | server
          game-versions: '26.2'
          game-version-filter: none
          java: '25'

          retry-attempts: 3
          retry-delay: 15000
          fail-mode: fail

      - name: Apply formatted CurseForge changelog
        env:
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_FILE_ID: ${{ steps.publish.outputs.curseforge-version }}
        shell: bash
        run: |
          if [[ ! "$CURSEFORGE_FILE_ID" =~ ^[0-9]+$ ]]; then
            echo "Publisher did not return a valid CurseForge file ID: $CURSEFORGE_FILE_ID" >&2
            exit 1
          fi

          jq -cn \
            --argjson fileID "$CURSEFORGE_FILE_ID" \
            --rawfile changelog curseforge-release-notes.html \
            '{ fileID: $fileID, changelog: $changelog, changelogType: "html" }' \
            > curseforge-update.json

          response="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "X-Api-Token: $CURSEFORGE_TOKEN" \
            --form "metadata=<curseforge-update.json;type=application/json" \
            "https://minecraft.curseforge.com/api/projects/$CURSEFORGE_PROJECT_ID/update-file")"

          updated_id="$(jq -r '.id // empty' <<< "$response")"
          if [[ "$updated_id" != "$CURSEFORGE_FILE_ID" ]]; then
            echo "CurseForge returned an unexpected file ID: $updated_id" >&2
            exit 1
          fi
