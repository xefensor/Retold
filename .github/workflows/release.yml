name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read and validate release version
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          if [[ -z "$version" ]]; then
            echo "mod_version is missing from gradle.properties" >&2
            exit 1
          fi

          tag="v$version"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "$tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match mod_version $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Ensure release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists" >&2
            exit 1
          fi

      - name: Verify changelog entry
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if ! grep -Fq "## $VERSION - " CHANGELOG.md; then
            echo "CHANGELOG.md has no release entry for $VERSION" >&2
            exit 1
          fi

      - name: Build and run unit tests
        run: ./gradlew clean build

      - name: Run GameTests
        run: ./gradlew runGameTestServer
        timeout-minutes: 10

      - name: Extract release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          awk -v version="$VERSION" '
            index($0, "## " version " - ") == 1 { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "Release notes for $VERSION are empty" >&2
            exit 1
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          artifact="build/libs/retold-$VERSION.jar"
          if [[ ! -f "$artifact" ]]; then
            echo "Expected release artifact not found: $artifact" >&2
            exit 1
          fi

          (
            cd "$(dirname "$artifact")"
            sha256sum "$(basename "$artifact")" > "$(basename "$artifact").sha256"
          )

          gh release create "$TAG" "$artifact" "$artifact.sha256" \
            --target "$GITHUB_SHA" \
            --title "Retold $VERSION" \
            --notes-file release-notes.md
